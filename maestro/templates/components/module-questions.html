{{define "module-questions"}}
<ul class="item-list questions-list">
	{{range $ii, $item := .}}
	<li class="question-item {{if $item.Answered}}question-answered{{end}}" data-item-idx="{{$ii}}">
		<div class="question-header">
			<span class="question-status">{{if $item.Answered}}✓{{else}}?{{end}}</span>
			<span class="question-text">{{$item.Text}}</span>
		</div>
		{{if not $item.Answered}}
		<textarea class="question-input" placeholder="Type your answer…" rows="2"></textarea>
		{{end}}
		{{if $item.Answer}}
		<p class="question-answer"><strong>Answer:</strong> {{$item.Answer}}</p>
		{{end}}
	</li>
	{{end}}
</ul>
<div class="questions-send-bar">
	<span class="questions-send-count" data-qs-count="0">0 answered</span>
	<button class="questions-send-btn" disabled>Send Responses</button>
	<span class="questions-send-status"></span>
</div>
{{end}}
