{{define "module-steps"}}
<ol class="item-list steps-list">
	{{range $ii, $item := .}}
	<li class="step-item" data-item-idx="{{$ii}}">
		<div class="step-content">
			<span class="step-text">{{$item.Text}}</span>
			{{if $item.Owner}}<span class="step-owner">{{$item.Owner}}</span>{{end}}
		</div>
		{{if $item.Status}}
		<span class="badge badge-{{$item.Status}}">{{$item.Status}}</span>
		{{end}}
	</li>
	{{end}}
</ol>
{{end}}
