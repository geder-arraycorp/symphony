{{define "module-risks"}}
<div class="risk-list">
	{{range $ii, $item := .}}
	<div class="risk-card risk-{{$item.Severity}}" data-item-idx="{{$ii}}">
		<div class="risk-header">
			{{if $item.Severity}}<span class="risk-severity badge badge-{{$item.Severity}}">{{$item.Severity}}</span>{{end}}
			<span class="risk-text">{{$item.Text}}</span>
		</div>
		{{if $item.Impact}}
		<p class="risk-detail"><strong>Impact:</strong> {{$item.Impact}}</p>
		{{end}}
		{{if $item.Mitigation}}
		<p class="risk-detail"><strong>Mitigation:</strong> {{$item.Mitigation}}</p>
		{{end}}
	</div>
	{{end}}
</div>
{{end}}
