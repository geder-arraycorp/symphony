{{define "approval-panel"}}
<div class="approval-panel" id="approval-panel">
	<div class="approval-header" onclick="toggleApprovalPanel()">
		<span class="approval-status-dot {{if .Approved}}approved{{else}}pending{{end}}"></span>
		<span class="approval-header-title">{{if .Approved}}Approved{{else}}Pending Approval{{end}}</span>
		<span class="approval-toggle-btn" id="approval-toggle-btn">▼</span>
	</div>

	<div class="approval-body" id="approval-body">
		<p class="approval-description">
			{{if .Approved}}
				This plan is approved for implementation. The agent will proceed with building it.
			{{else}}
				Approve this plan to signal the agent to start implementation.
			{{end}}
		</p>
		<div class="approval-actions">
			<button class="approval-btn {{if .Approved}}revoke{{else}}approve{{end}}" id="approval-btn" onclick="toggleApproval()">
				{{if .Approved}}Revoke Approval{{else}}Approve Plan{{end}}
			</button>
			<span class="approval-status" id="approval-status"></span>
		</div>
	</div>
</div>
{{end}}
